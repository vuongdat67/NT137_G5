name: Phase10 Cross Platform Packaging

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  smoke-and-package:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      QT_QPA_PLATFORM: offscreen
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmagic1 \
            libmagic-dev \
            graphviz \
            libegl1 \
            libgl1 \
            libxcb-glx0 \
            libxcb-image0 \
            libxcb-icccm4 \
            libxcb-cursor0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-util1 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Install Python deps
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Unit smoke tests
        working-directory: .
        run: |
          python -m pytest -q -p no:pytestqt tests/unit/test_settings.py tests/unit/test_hashing.py

      - name: CLI help smoke (Linux)
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          python -c "import subprocess, sys; p = subprocess.run([sys.executable, 'main.py', '--help'], capture_output=True, text=True, timeout=60); print(p.stdout); print(p.stderr, file=sys.stderr); raise SystemExit(p.returncode)"

      - name: CLI help smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: .
        run: |
          python main.py --help

      - name: Build bundled app
        working-directory: .
        run: |
          python -m PyInstaller --noconfirm --clean malware_analyzer.spec

      - name: Smoke packaged binary
        working-directory: .
        run: |
          python scripts/smoke_packaged_app.py

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: malware_analyzer-${{ matrix.os }}
          path: dist/malware_analyzer
