name: Phase10 Cross Platform Packaging

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  smoke-and-package:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 libmagic-dev graphviz

      - name: Install Python deps
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Unit smoke tests
        working-directory: .
        run: |
          python -m pytest -q tests/unit/test_settings.py tests/unit/test_hashing.py

      - name: CLI help smoke
        working-directory: .
        run: |
          python main.py --help

      - name: Build bundled app
        working-directory: .
        run: |
          python -m PyInstaller --noconfirm --clean malware_analyzer.spec

      - name: Smoke packaged binary
        working-directory: .
        run: |
          python scripts/smoke_packaged_app.py

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: malware_analyzer-${{ matrix.os }}
          path: dist/malware_analyzer
