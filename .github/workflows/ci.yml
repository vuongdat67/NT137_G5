name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-package:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
      PYTHONWARNINGS: "ignore::UserWarning"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmagic1 \
            libmagic-dev \
            libegl1 \
            libgl1 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0 \
            libxcb-shape0

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install libmagic libomp

      - name: Configure macOS OpenMP runtime
        if: runner.os == 'macOS'
        run: |
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix libomp)/lib:${DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=72,<81" wheel
          python -m pip install -e ".[dev,packaging]"

      - name: Import smoke
        run: |
          python - <<'PY'
          import importlib
          modules = [
              "magic",
              "PyQt6",
              "pyqtgraph",
              "pandas",
              "numpy",
              "sklearn",
              "joblib",
              "lightgbm",
          ]
          for name in modules:
              importlib.import_module(name)
              print(f"OK import: {name}")
          PY

      - name: Unit tests (targeted)
        run: |
          python -m pytest -q tests/unit/test_crud.py tests/unit/test_hashing.py tests/unit/test_predictor.py tests/unit/test_trainer.py

      - name: CLI smoke
        run: |
          python main.py --help

      - name: Build bundled app
        run: |
          python -m PyInstaller --noconfirm --clean malware_analyzer.spec

      - name: Smoke packaged app
        run: |
          python scripts/smoke_packaged_app.py

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: malware_analyzer-${{ matrix.os }}
          path: dist/malware_analyzer
          include-hidden-files: true
