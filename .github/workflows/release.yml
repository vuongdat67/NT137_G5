name: Release Multi-Platform Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: malware_analyzer-windows-amd64
            ext: exe
            archive: zip
          - os: ubuntu-latest
            artifact_name: malware_analyzer-linux-amd64
            ext: ""
            archive: tar.gz
          - os: macos-13
            artifact_name: malware_analyzer-darwin-amd64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            artifact_name: malware_analyzer-darwin-arm64
            ext: ""
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
      PYTHONWARNINGS: "ignore::UserWarning"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmagic1 \
            libmagic-dev \
            libegl1 \
            libgl1 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0 \
            libxcb-shape0

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install libmagic libomp

      - name: Configure macOS OpenMP runtime
        if: runner.os == 'macOS'
        run: |
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix libomp)/lib:${DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=72,<81" wheel
          pip install -e ".[dev,packaging]"

      - name: Build binary with PyInstaller (onefile)
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name malware_analyzer main.py

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "dist/malware_analyzer.exe" "${{ matrix.artifact_name }}.exe"
          Compress-Archive -Path "dist/malware_analyzer.exe" -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp dist/malware_analyzer ${{ matrix.artifact_name }}
          tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist malware_analyzer

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-bundle
          path: |
            ${{ matrix.artifact_name }}*
          include-hidden-files: true

  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_binaries
          pattern: malware_analyzer-*-bundle
          merge-multiple: true

      - name: Create mega zip
        run: |
          zip -r malware_analyzer-binaries.zip all_binaries/

      - name: Upload mega zip
        uses: actions/upload-artifact@v4
        with:
          name: malware_analyzer-all-in-one
          path: malware_analyzer-binaries.zip
